<!DOCTYPE html>
<html>
  <head>
    <style>
		body {
		  display: grid;
		  grid-template-areas:
		  "nav header"
		  "nav article"
		  "nav ads"
		  "nav footer";
		  grid-template-columns: 10% 90%;
		  grid-template-rows: 20% 55% 20% ;
		}
		
		.nav, .header, .article, .ads, .footer {
		background-color: PaleGreen;
		border: 5px solid white;
		padding: 5%;
		}
		
		.nav {
			grid-area: nav;
		}
		
		.header {
			grid-area: header;
		}
		
		.article {
			grid-area: article;
		}
		
		.ads {
			grid-area: ads;
		}
		
		.footer {
			grid-area: footer;
		}
    </style>
  </head>
  <body>
    <div class="nav">
		Nav
	</div>
    <div class="header">
		Header
	</div>
    <div class="article">
		Article
	</div>
    <div class="ads">
		Ads
	</div>
    <div class="footer">
		Footer
	</div>
   </body> 	
</html>
