<!doctype html>
<html>
	<head>
		<meta charset="uft-8"/>
		<title>Actividad Filtros</title>
		<style>
			.guitarra1{
				display: inline
				width: 40%
				-webkit-filter: grayscale(1);
				-moz-filter: grayscale(1);
				-o-filter: grayscale(1);
				-ms-filter: grayscale(1);
				filter: grayscale(1);
			}
			.guitarra2{
				display: inline
				width: 40%
				-webkit-filter: opacity(5);
				-moz-filter: opacity(5);
				-o-filter: opacity(5);
				-ms-filter: opacity(5);
				filter: opacity(5);
			}
			.guitarra3{
				display: inline
				width: 40%
				-webkit-filter: sepia(1);
				-moz-filter: sepia(1);
				-o-filter: sepia(1);
				-ms-filter: sepia(1);
				filter: sepia(1);
			}	
		</style>
	</head>
	<body>
		<div class="idc-box">
			<p class="idc-titulo">Indice</p>
			<ul class="idc-lista">
 				<li><a href="#guitarra1">Guitarra Grayscale</a></li>
				<li><a href="#guitarra2">Guitarra Opacity</a></li>
				<li><a href="#guitarra3">Guitarra Sepia</a></li>
			</ul>
		</div>
		<section>
			<div id="guitarra1" class="guitarra1"><img src="img/guitarra.jpg" width="500"></div>
			<div id="guitarra2" class="guitarra2"><img src="img/guitarra.jpg" width="500"></div>
			<div id="guitarra3" class="guitarra3"><img src="img/guitarra.jpg" width="500"></div>
		</section>
		<footer>
		
			© Todos los derechos a Manuel Solar Bueno, alumno de 1º DAW del IES Gran Capitán
		
		</footer>
	</body>
</html>
