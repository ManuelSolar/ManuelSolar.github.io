<!DOCTYPE HTML>
<html lang="es">
	<head>
		<meta charset="UTF-8">
		<title></title>
        <style>
            dt{
                position: -webkit-sticky;
                position: sticky;
                top:0;
                left:0;
                background-color: cornsilk;
                
            }
        </style>
	</head>
	<body>
        <dl>
            <dt><div class="sticky">A</div></dt>
                <dd>Apple</dd>
                <dd>Ant</dd>
                <dd>Altimeter</dd>
                <dd>Airplane</dd>
            <dt><div class="sticky">B</div></dt>
                <dd>Bird</dd>
                <dd>Buzzard</dd>
                <dd>Bee</dd>
                <dd>Banana</dd>
                <dd>Beanstalk</dd>
            <dt><div class="sticky">C</div></dt>
                <dd>Calculator</dd>
                <dd>Cane</dd>
                <dd>Camera</dd>
                <dd>Camel</dd>
            <dt><div class="sticky">D</div></dt>
                <dd>Duck</dd>
                <dd>Dime</dd>
                <dd>Dipstick</dd>
                <dd>Drone</dd>
            <dt><div class="sticky">E</div></dt>
                <dd>Egg</dd>
                <dd>Elephant</dd>
                <dd>Egret</dd>
        </dl>

	</body>
</html>
