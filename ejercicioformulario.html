<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <title>Trabajando con Formularios</title>
</head>

<body>
    <header>
        <h1>Ejemplos de formularios</h1>
    </header>
    <main>
        <section>
            <h3>Formulario 1</h3>
            <form name="formulario" method="GET" action="mailto:manuelsolarbueno@gmail.com">
                <p><label>Nombre: <input type="text" name="nombre" maxlength="15"></label></p>
                <p><label>Edad: <input type="number" name="edad"></label></p>
                <p><label>Correo: <input type="email" name="correo"></label></p>
                <p><label>Teléfono: <input type="tel" name="telefono"></label></p>
                <p><label>Sitio Web: <input type="url" name="sitioweb"></label></p>
                <p><input type="submit" value="Enviar"></p>
            </form>
        </section>
        <section>
            <h3>Formulario 2</h3>
            <form name="formulario" method="GET" action="mailto:manuelsolarbueno@gmail.com">
                <p>
                    <label for="listado">Nacionalidad:</label>
                    <select name="nacionalidad" id="listado">
                        <option value="1">Española</option>
                        <option value="2">Inglesa</option>
                        <option value="3">Francesa</option>
                        <option value="4">Alemana</option>
                    </select>
                </p>
                <p><input type="submit" value="Enviar"></p>
            </form>
        </section>
    </main>
    <footer>
      &copy; Todos los derecho Manuel Solar Bueno
    </footer>
</body>
</html>
