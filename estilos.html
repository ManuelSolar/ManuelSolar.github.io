<!DOCTYPE html>
<html lang="es">
    <head>
        <title>Estilos CSS</title>
        <meta charset="utf-8">
        <meta name="description" content="Practicas de estilos css">
        <meta name="keywords" content="estilos, css">
        <style>
          p,span {
            font-size: 16px;
          }
          p span {
            font-size: 14px;
          }
          header p {
            font-size: 22px;
          }

          p[name] {
            background: yellow;
          }
          p[name="p1"] {
            background: red;
          }
          p[name~="p2"] {
            background: green;
          }
          p[name^="p3"] {
            background: grey;
          }
          p[name$="p4"] {
            background: purple;
          }
          p[name*="p5"] {
            background: orange;
          }
         </style> 
    </head>
    <body>
    <header>
        <h1 id="top"></h1>
    </header>
    <main>
        <section>
            <article>
                <header>
                   <h2>Aplicando estilos</h2>
                   <p> Esta es la introducción</p>
                </header>
                <body>
                  <span>Esto es un elemento span</span>
                  <p>Esto es un elemento p</p>
                  <p><span>Esto es un elemento span dentro de un elemento p</span></p>
                  <p>-------------------------------------------------</p>
                  <p name="p">p.</p>
                  <p name="p1">p1.</p>
                  <p name="p2">p2.</p>
                  <p name="p3">p3.</p>
                  <p name="p4">p4.</p>
                  <p name="p5">p5.</p>
                </body>
            </article>
        </section>
    </main>
    <footer>
      &copy; Todos los derechos a Manuel Solar Bueno
    </footer>
    </body>
</html>
